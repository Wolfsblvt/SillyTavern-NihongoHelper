<div id="extension_settings_nihongo_helper" class="extension_container">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Nihongo Helper</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <div class="flex-container flexFlowColumn">
                <label class="checkbox_label" for="nihongo_helper_enabled">
                    <input type="checkbox" id="nihongo_helper_enabled" />
                    <span>Enable furigana above kanji</span>
                </label>
                <label class="checkbox_label" for="nihongo_helper_hover_only" title="When enabled, furigana is only visible when hovering over a paragraph. Space is always reserved to prevent layout shifts.">
                    <input type="checkbox" id="nihongo_helper_hover_only" />
                    <div class="flex-container flexFlowColumn alignItemsFlexStart">
                        <span>Show furigana only on hover</span>
                        <small class="notes">Space is reserved even when hidden, preventing layout shifts</small>
                    </div>
                </label>
                <label class="checkbox_label" for="nihongo_helper_highlight_known" title="Subtly highlight kanji that are marked as known in the Kanji Manager.">
                    <input type="checkbox" id="nihongo_helper_highlight_known" />
                    <span>Highlight known kanji</span>
                </label>
                <div class="flex-container flexFlowColumn" style="margin-top: 8px;">
                    <label for="nihongo_helper_font_size">
                        <span>Japanese text size: <span id="nihongo_helper_font_size_value">1x</span></span>
                    </label>
                    <input type="range" id="nihongo_helper_font_size" min="0.5" max="2.0" step="0.05" value="1.0" />
                </div>
                <div class="flex-container flexFlowColumn" style="margin-top: 4px;">
                    <label for="nihongo_helper_furigana_scale">
                        <span>Furigana size: <span id="nihongo_helper_furigana_scale_value">0.75x</span></span>
                    </label>
                    <input type="range" id="nihongo_helper_furigana_scale" min="0.3" max="1.5" step="0.05" value="0.75" />
                </div>
                <div class="flex-container flexFlowColumn" style="margin-top: 8px;">
                    <label for="nihongo_helper_meaning_spoiler">
                        <span>Meaning spoiler</span>
                    </label>
                    <select id="nihongo_helper_meaning_spoiler" class="text_pole">
                        <option value="off">Show immediately</option>
                        <option value="hover">Reveal on hover</option>
                        <option value="delay2">Reveal after 2s</option>
                        <option value="delay5">Reveal after 5s</option>
                    </select>
                    <small class="notes">Hide word meanings behind a spoiler blur to test your knowledge first</small>
                </div>
                <hr style="margin: 8px 0;" />
                <span style="font-weight: 600; font-size: 0.9em; opacity: 0.7;">Inspect Mode</span>
                <label class="checkbox_label" for="nihongo_helper_selection_lookup" title="Show word tooltip when selecting Japanese text, even without inspect mode active.">
                    <input type="checkbox" id="nihongo_helper_selection_lookup" />
                    <div class="flex-container flexFlowColumn alignItemsFlexStart">
                        <span>Selection lookup</span>
                        <small class="notes">Select any Japanese text to see its tooltip — works without inspect mode</small>
                    </div>
                </label>
                <label class="checkbox_label" for="nihongo_helper_hide_known_furigana" title="Skip furigana for words where all kanji are already marked as known.">
                    <input type="checkbox" id="nihongo_helper_hide_known_furigana" />
                    <div class="flex-container flexFlowColumn alignItemsFlexStart">
                        <span>Hide furigana for known words</span>
                        <small class="notes">Words where all kanji are known won't show readings</small>
                    </div>
                </label>
                <label class="checkbox_label" for="nihongo_helper_kana_word_tooltips" title="Also make kana-only words hoverable for tooltip lookup in Inspect Mode.">
                    <input type="checkbox" id="nihongo_helper_kana_word_tooltips" />
                    <div class="flex-container flexFlowColumn alignItemsFlexStart">
                        <span>Kana word tooltips</span>
                        <small class="notes">Make kana-only words hoverable in inspect mode (more hover targets)</small>
                    </div>
                </label>
                <div class="flex-container flexFlowColumn" style="margin-top: 4px;">
                    <label for="nihongo_helper_lookup_window">
                        <span>Lookup window size: <span id="nihongo_helper_lookup_window_value">5</span></span>
                    </label>
                    <input type="range" id="nihongo_helper_lookup_window" min="1" max="10" step="1" value="5" />
                    <small class="notes">Max tokens to combine for multi-word dictionary lookup (1 = disabled)</small>
                </div>
                <hr style="margin: 8px 0;" />
                <span style="font-weight: 600; font-size: 0.9em; opacity: 0.7;">UI</span>
                <div class="flex-container flexFlowColumn" style="margin-top: 4px;">
                    <label for="nihongo_helper_panel_side">
                        <span>Search panel side</span>
                    </label>
                    <select id="nihongo_helper_panel_side" class="text_pole">
                        <option value="right">Right</option>
                        <option value="left">Left</option>
                    </select>
                </div>
                <hr style="margin: 8px 0;" />
                <div class="flex-container">
                    <button id="nihongo_helper_open_kanji_manager" class="menu_button menu_button_icon" title="Open the Kanji Manager to browse, search, and mark kanji as known">
                        <i class="fa-solid fa-book-open"></i>
                        <span>Kanji Manager</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
